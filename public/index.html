<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #059669;
            --danger-color: #dc2626;
            --warning-color: #d97706;
            --dark-color: #1e293b;
            --light-bg: #f8fafc;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --card-hover-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin: 2rem auto;
            max-width: 1200px;
            min-width: 480px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
            color: white;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 2rem;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .content-area {
            padding: 2rem;
        }

        .engine-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .engine-card:hover {
            box-shadow: var(--card-hover-shadow);
            transform: translateY(-1px);
        }

        .engine-header {
            background: linear-gradient(135deg, var(--light-bg) 0%, #e2e8f0 100%);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .engine-name {
            font-weight: 600;
            color: var(--dark-color);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .engine-name i {
            margin-right: 0.5rem;
            color: var(--primary-color);
        }

        .engine-body {
            padding: 1.5rem;
        }

        .metric-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .metric-group {
            flex: 1;
        }

        .metric-label {
            display: block;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.125rem;
            font-weight: 500;
            transition: all 0.3s ease;
            background: white;
        }

        .metric-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .metric-input:hover {
            border-color: #cbd5e1;
        }

        .metric-unit {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-color);
            font-size: 0.875rem;
            pointer-events: none;
        }

        .metric-wrapper {
            position: relative;
        }

        .delete-btn {
            background: linear-gradient(135deg, var(--danger-color) 0%, #ef4444 100%);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #b91c1c 0%, var(--danger-color) 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(220, 38, 38, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn-modern {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: none;
        }

        .btn-primary-modern {
            background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary-modern:hover:not(:disabled) {
            background: linear-gradient(135deg, #1d4ed8 0%, var(--primary-color) 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .btn-success-modern {
            background: linear-gradient(135deg, var(--success-color) 0%, #10b981 100%);
            color: white;
        }

        .btn-success-modern:hover:not(:disabled) {
            background: linear-gradient(135deg, #047857 0%, var(--success-color) 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.4);
        }

        .btn-modern:disabled {
            background: #9ca3af !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .alert-modern {
            border: none;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--card-shadow);
        }

        .alert-danger-modern {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            color: var(--danger-color);
            border-left: 4px solid var(--danger-color);
        }

        .header-table {
            background: var(--light-bg);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .header-row {
            display: flex;
            font-weight: 600;
            color: var(--dark-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.875rem;
        }

        .header-path {
            flex: 2;
            text-align: left;
        }

        .header-time {
            flex: 1;
            text-align: center;
        }

        @media (max-width: 768px) {
            .main-container {
                margin: 1rem;
                border-radius: 12px;
            }

            .header {
                padding: 1.5rem;
            }

            .content-area {
                padding: 1rem;
            }

            .metric-row {
                flex-direction: column;
                gap: 0.5rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-modern {
                justify-content: center;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <title>Engine Hours Editor</title>
    <meta name="description" content="A web application for editing engine hours data.">
    <link rel="icon" type="image/png" href="icons/icon-72x72.png">
</head>

<body>
    <div class="main-container">
        <div class="header">
            <img src="icons/icon-72x72.png" alt="Engine Hours Icon" class="header-icon">
            <h1>Engine Hours Editor</h1>
        </div>
        <div class="content-area">
            <div id="json-container"></div>
            <div class="action-buttons">
                <button id="reload-button" class="btn-modern btn-primary-modern" aria-label="Reload Data">
                    <i class="fas fa-sync-alt"></i>
                    Reload Data
                </button>
                <button id="save-button" class="btn-modern btn-success-modern" disabled aria-label="Save Changes">
                    <i class="fas fa-save"></i>
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        const url = window.location.origin + '/plugins/signalk-engine-hours/hours';
        let jsonData = null;

        // Function to fetch JSON data from the server
        async function fetchData() {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                jsonData = await response.json();
                displayJsonData();
            } catch (error) {
                console.error(error);
            }
        }

        // Function to display JSON data and make runTime editable
        function displayJsonData() {
            const jsonContainer = document.getElementById('json-container');
            jsonContainer.innerHTML = '';

            // Add header table if there are paths
            if (jsonData.paths && jsonData.paths.length > 0) {
                const headerDiv = document.createElement('div');
                headerDiv.className = 'header-table';
                headerDiv.innerHTML = `
                    <div class="header-row">
                        <div class="header-path">Engine Path</div>
                        <div class="header-time">Runtime (hours)</div>
                        <div class="header-time">Trip Runtime (hours)</div>
                    </div>
                `;
                jsonContainer.appendChild(headerDiv);
            }

            jsonData.paths.forEach((pathData, index) => {
                const div = document.createElement('div');
                const matches = pathData.path.match(/[^.]+\.(.+)\.[^.]+/);
                const engineName = matches ? matches[1] : null;
                
                div.className = 'engine-card';
                div.innerHTML = `
                    <div class="engine-header">
                        <div class="engine-name">
                            <i class="fas fa-cog"></i>
                            propulsion.${engineName}
                        </div>
                        <button class="delete-btn" onclick="deleteSection(${index})">
                            <i class="fas fa-trash"></i>
                            Delete
                        </button>
                    </div>
                    <div class="engine-body">
                        <div class="metric-row">
                            <div class="metric-group">
                                <label class="metric-label" for="runTime${index}">Total Runtime</label>
                                <div class="metric-wrapper">
                                    <input class="metric-input" type="number" step="1.0" id="runTime${index}" 
                                           value="${parseFloat(pathData.runTime/3600).toFixed(1)}" 
                                           aria-label="Total Runtime for ${engineName}">
                                    <span class="metric-unit">hours</span>
                                </div>
                            </div>
                            <div class="metric-group">
                                <label class="metric-label" for="runTimeTrip${index}">Trip Runtime</label>
                                <div class="metric-wrapper">
                                    <input class="metric-input" type="number" step="1.0" id="runTimeTrip${index}" 
                                           value="${parseFloat(pathData.runTimeTrip/3600).toFixed(1)}" 
                                           aria-label="Trip Runtime for ${engineName}">
                                    <span class="metric-unit">hours</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                jsonContainer.appendChild(div);
            });

            checkChanges(); // Enable/disable the Save button after rendering
        }

        // Function to delete a section from the JSON data
        function deleteSection(index) {
            if (jsonData.paths.length > index) {
                jsonData.paths.splice(index, 1);
                displayJsonData();
                enableSaveButton(); // Explicitly enable the Save button
            }
        }

        // Function to send edited data back to the server using PUT
        async function saveChanges() {
            try {
                // Update jsonData with modified values from input fields
                const inputs = document.querySelectorAll('input[type="number"]');
                for (let i = 0; i < inputs.length; i++) {
                    const inputValue = parseFloat(inputs[i].value);
                    if (i % 2 === 0) {
                        jsonData.paths[Math.floor(i / 2)].runTime = parseInt(inputValue* 3600);
                    } else {
                        jsonData.paths[Math.floor(i / 2)].runTimeTrip = parseInt(inputValue * 3600);
                    }
                }

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(jsonData) // Send the entire edited JSON data
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                console.log('Data saved successfully.');
                fetchData(); // Reload data after saving
            } catch (error) {
                displayErrorMessage(error.message);
            }
        }

        // Function to display error messages to the user
        function displayErrorMessage(message) {
            const jsonContainer = document.getElementById('json-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'alert-modern alert-danger-modern';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
            jsonContainer.prepend(errorDiv);
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }

        // Function to enable the Save button
        function enableSaveButton() {
            const saveButton = document.getElementById('save-button');
            saveButton.disabled = false;
        }

        // Function to disable the Save button
        function disableSaveButton() {
            const saveButton = document.getElementById('save-button');
            saveButton.disabled = true;
        }

        // Function to check if any values have changed and enable/disable the Save button accordingly
        function checkChanges() {
            const saveButton = document.getElementById('save-button');
            const inputs = document.querySelectorAll('input[type="number"]');
            let dataChanged = false;

            for (let i = 0; i < inputs.length; i++) {
                const inputValue = parseInt(parseFloat(inputs[i].value) * 3600);
                let originalValue;
                if (i % 2 === 0) {
                    originalValue = jsonData.paths[Math.floor(i / 2)].runTime;
                } else {
                    originalValue = jsonData.paths[Math.floor(i / 2)].runTimeTrip;
                }
                if (inputValue !== originalValue) {
                    dataChanged = true;
                    break;
                }
            }

            saveButton.disabled = !dataChanged;
        }

        // Event listener for the Reload Data button
        document.getElementById('reload-button').addEventListener('click', fetchData);

        // Event listener for the Save Changes button
        document.getElementById('save-button').addEventListener('click', saveChanges);

        // Event listener to track changes in input values
        document.addEventListener('input', (event) => {
            const input = event.target;
            if (input.tagName === 'INPUT' && input.type === 'number') {
                checkChanges();
            }
        });

        // Fetch and display data when the page loads
        fetchData();
    </script>
</body>

</html>
